kind = "web"
previewPath = "/"
title = "CineClub"
version = "1.0.0"
id = "artifacts/cineclub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21151

[services.development]
run = "pnpm --filter @workspace/cineclub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cineclub", "run", "build" ]
publicDir = "artifacts/cineclub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21151"
BASE_PATH = "/"

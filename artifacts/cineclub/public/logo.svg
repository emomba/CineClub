<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <clipPath id="lobar">
      <rect x="12" y="30" width="76" height="16" rx="5"/>
    </clipPath>
    <clipPath id="hibar">
      <rect x="12" y="12" width="76" height="16" rx="5"/>
    </clipPath>
  </defs>

  <!-- ── Board body ── -->
  <rect x="12" y="44" width="76" height="48" rx="7" fill="#111"/>
  <rect x="12" y="44" width="76" height="48" rx="7" fill="none"
        stroke="url(#g)" stroke-width="1.8" opacity="0.7"/>

  <!-- Board content lines -->
  <rect x="22" y="57" width="42" height="3" rx="1.5" fill="url(#g)" opacity="0.7"/>
  <rect x="22" y="67" width="30" height="3" rx="1.5" fill="url(#g)" opacity="0.45"/>
  <rect x="22" y="77" width="36" height="3" rx="1.5" fill="url(#g)" opacity="0.45"/>

  <!-- ── Lower clapper bar (fixed) ── -->
  <rect x="12" y="30" width="76" height="16" rx="5" fill="url(#g)"/>
  <!-- diagonal stripes -->
  <g clip-path="url(#lobar)">
    <polygon points="22,30 32,30 17,46 7,46"  fill="#050505" opacity="0.38"/>
    <polygon points="42,30 52,30 37,46 27,46"  fill="#050505" opacity="0.38"/>
    <polygon points="62,30 72,30 57,46 47,46"  fill="#050505" opacity="0.38"/>
    <polygon points="82,30 92,30 77,46 67,46"  fill="#050505" opacity="0.38"/>
  </g>

  <!-- ── Upper clapper arm (open ~25°) ── -->
  <g transform="rotate(-25 12 30)">
    <rect x="12" y="12" width="76" height="16" rx="5" fill="url(#g)"/>
    <!-- diagonal stripes on upper arm -->
    <g clip-path="url(#hibar)">
      <polygon points="22,12 32,12 17,28 7,28"  fill="#050505" opacity="0.38"/>
      <polygon points="42,12 52,12 37,28 27,28"  fill="#050505" opacity="0.38"/>
      <polygon points="62,12 72,12 57,28 47,28"  fill="#050505" opacity="0.38"/>
      <polygon points="82,12 92,12 77,28 67,28"  fill="#050505" opacity="0.38"/>
    </g>
  </g>

  <!-- Hinge dot -->
  <circle cx="12" cy="30" r="4" fill="#0a0a0a"/>
  <circle cx="12" cy="30" r="2"  fill="url(#g)" opacity="0.95"/>
</svg>

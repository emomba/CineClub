<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 112 90">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="gs" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.5"/>
    </linearGradient>
    <radialGradient id="lns" cx="35%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#222"/>
      <stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <clipPath id="ca">
      <rect x="63" y="26" width="48" height="10" rx="3"/>
    </clipPath>
    <clipPath id="cb">
      <rect x="65" y="14" width="46" height="10" rx="3"/>
    </clipPath>
  </defs>

  <!-- ▌FILM CAMERA — left zone x: 2-52 ▌ -->

  <rect x="3"  y="36" width="49" height="32" rx="7" fill="url(#g)"/>
  <rect x="7"  y="24" width="16" height="13" rx="5" fill="url(#g)"/>
  <rect x="30" y="25" width="16" height="12" rx="4" fill="url(#g)"/>

  <circle cx="25" cy="52" r="13"  fill="#0a0a0a"/>
  <circle cx="25" cy="52" r="13"  fill="none" stroke="url(#gs)" stroke-width="1.8"/>
  <circle cx="25" cy="52" r="8.8" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <circle cx="25" cy="52" r="7.6" fill="url(#lns)"/>
  <circle cx="20" cy="47" r="2"   fill="white" opacity="0.13"/>
  <circle cx="19" cy="46" r="0.9" fill="white" opacity="0.3"/>

  <!-- ▌CLAPPERBOARD — right zone x: 64-110 ▌ -->

  <!-- Board body -->
  <rect x="64" y="38" width="46" height="44" rx="5" fill="#101010"/>
  <rect x="64" y="38" width="46" height="44" rx="5" fill="none" stroke="url(#gs)" stroke-width="1.5"/>

  <!-- Board info lines -->
  <rect x="71" y="49" width="28" height="2.5" rx="1.2" fill="url(#gs)"/>
  <rect x="71" y="58" width="20" height="2.5" rx="1.2" fill="url(#gs)" opacity="0.55"/>
  <rect x="71" y="67" width="24" height="2.5" rx="1.2" fill="url(#gs)" opacity="0.55"/>

  <!-- Lower clapper bar (attached to board top) -->
  <rect x="63" y="28" width="48" height="10" rx="3.5" fill="url(#g)"/>
  <g clip-path="url(#ca)">
    <rect x="63" y="26" width="48" height="10" fill="url(#g)"/>
    <polygon points="73,26 81,26  68,36  60,36" fill="#050505" opacity="0.42"/>
    <polygon points="90,26 98,26  85,36  77,36" fill="#050505" opacity="0.42"/>
    <polygon points="107,26 115,26 102,36  94,36" fill="#050505" opacity="0.42"/>
  </g>

  <!-- Upper clapper arm — open, pivots at hinge (65, 28) -->
  <g transform="rotate(-20 65 28)">
    <rect x="65" y="16" width="46" height="10" rx="3.5" fill="url(#g)"/>
    <g clip-path="url(#cb)">
      <rect x="65" y="14" width="46" height="10" fill="url(#g)"/>
      <polygon points="74,14 82,14  69,24  61,24" fill="#050505" opacity="0.42"/>
      <polygon points="91,14 99,14  86,24  78,24" fill="#050505" opacity="0.42"/>
      <polygon points="108,14 116,14 103,24  95,24" fill="#050505" opacity="0.42"/>
    </g>
  </g>

  <!-- Hinge pin -->
  <circle cx="65" cy="28" r="3" fill="#050505"/>
  <circle cx="65" cy="28" r="1.5" fill="url(#g)" opacity="0.9"/>
</svg>
